<!DOCTYPE html>
<html>
<head>
<title>Branch Details</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <div class="logo">Aura Health</div>
</header>

<section class="page">
    <h1 id="branchName"></h1>
    <p id="branchInfo"></p>
</section>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

let title = "";
let info = "";

if(name === "greenfield"){
    title = "Greenfield Branch";
    info = "Located in San Francisco with 24/7 emergency services.";
}
else if(name === "riverside"){
    title = "Riverside Branch";
    info = "Austin branch with advanced diagnostics.";
}
else if(name === "sunhill"){
    title = "Sunhill Branch";
    info = "Boston branch with expert doctors.";
}
else if(name === "carepoint"){
    title = "CarePoint Center";
    info = "New York branch with surgical facilities.";
}
else if(name === "wellness"){
    title = "Wellness Hub";
    info = "Chicago branch focused on preventive care.";
}
else if(name === "lifecare"){
    title = "LifeCare Center";
    info = "Los Angeles branch with modern infrastructure.";
}

document.getElementById("branchName").innerText = title;
document.getElementById("branchInfo").innerText = info;
</script>

</body>
</html>
