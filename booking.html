<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="booking-container">

  
    <div class="booking-left">

        <section class="form-page">

            <h2>Book Appointment</h2>

            <form id="bookingForm">

                <input type="text" id="name" placeholder="Full Name" required>

                <input type="email" id="email" placeholder="Email" required>

                <input type="tel" id="phone" placeholder="Phone Number" required>

                <input type="date" id="date" required>

                <select id="doctor" required>
                    <option value="">Select Doctor</option>

                    <optgroup label="Specialists">
                        <option>Dr. Maya Patel - Cardiology</option>
                        <option>Dr. Aisha Khan - Dermatology</option>
                        <option>Dr. Marcus Lee - Pediatrics</option>
                        <option>Dr. Neha Sharma - Gynecology</option>
                        <option>Dr. John Carter - Orthopedics</option>
                        <option>Dr. Riya Mehta - Neurology</option>
                        <option>Dr. David Smith - General Physician</option>
                        <option>Dr. Pooja Verma - Dentist</option>
                        <option>Dr. Rahul Singh - ENT Specialist</option>
                        <option>Dr. Emily Watson - Psychiatrist</option>
                    </optgroup>
                </select>

                <textarea id="message" placeholder="Describe your problem (optional)"></textarea>

                <button type="submit" class="btn">Book Appointment</button>

            </form>

            <p id="successMsg"></p>

        </section>

    </div>

    <!-- RIGHT SIDE (DESIGN) -->
    <div class="booking-right">
        <div class="overlay">
            <h4>AURA HEALTH</h4>
            <h1>Your care, beautifully organised.</h1>
        </div>
    </div>

</div>

<script src="js/booking.js"></script>

</body>
</html>
